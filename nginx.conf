# Event block required by nginx to handle connections
events {
    worker_connections 1024;
}

# Defining web tracfic rules for http connections
http {
    # Cluster of node server behind the nginx server
    upstream chat_cluster  {
        server chat-node-app:8000;
    }

    # The actual Nginx server listening on port 80
    server {
        listen 80;

        # Catch all route requests from the users
        location / {
            proxy_pass http://chat_cluster;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}